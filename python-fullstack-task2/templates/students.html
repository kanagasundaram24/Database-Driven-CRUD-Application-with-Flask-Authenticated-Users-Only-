<!DOCTYPE html>
<html>
<head>
<title>Students</title>
    <style>
        body{
    font-family: Arial, sans-serif;
    background-color:#f4f6f9;
    margin:0;
    padding:0;
}

.container{
    width:600px;
    margin:40px auto;
    background:white;
    padding:20px;
    border-radius:8px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

h2{
    text-align:center;
    color:#333;
}

input{
    width:100%;
    padding:8px;
    margin:5px 0 15px 0;
    border:1px solid #ccc;
    border-radius:4px;
}

button{
    width:100%;
    padding:10px;
    background:#007BFF;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#0056b3;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:20px;
}

table th, table td{
    border:1px solid #ddd;
    padding:8px;
    text-align:center;
}

table th{
    background:#007BFF;
    color:white;
}

a{
    text-decoration:none;
    color:#007BFF;
}
    </style>
</head>

<body>

<div class="container">

<h2>Students List</h2>

<a href="/add-student">Add Student</a>

<table>

<tr>
<th>Name</th>
<th>Email</th>
<th>Course</th>
<th>Actions</th>
</tr>

{% for s in students %}

<tr>
<td>{{ s['name'] }}</td>
<td>{{ s['email'] }}</td>
<td>{{ s['course'] }}</td>

<td>
<a href="/edit/{{ s['id'] }}">Edit</a> |
<a href="/delete/{{ s['id'] }}">Delete</a>
</td>
</tr>

{% endfor %}

</table>

</div>

</body>
</html>
