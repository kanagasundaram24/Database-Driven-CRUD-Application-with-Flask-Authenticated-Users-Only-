<!DOCTYPE html>
<html>
<head>
    <title>Edit Student</title>
    <style>
        body{
    font-family: Arial, sans-serif;
    background-color:#f4f6f9;
    margin:0;
    padding:0;
}

.container{
    width:600px;
    margin:40px auto;
    background:white;
    padding:20px;
    border-radius:8px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

h2{
    text-align:center;
    color:#333;
}

input{
    width:100%;
    padding:8px;
    margin:5px 0 15px 0;
    border:1px solid #ccc;
    border-radius:4px;
}

button{
    width:100%;
    padding:10px;
    background:#007BFF;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#0056b3;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:20px;
}

table th, table td{
    border:1px solid #ddd;
    padding:8px;
    text-align:center;
}

table th{
    background:#007BFF;
    color:white;
}

a{
    text-decoration:none;
    color:#007BFF;
}
    </style>
</head>
<body>

<h2>Edit Student</h2>

<form method="POST">

<label>Name</label><br>
<input type="text" name="name" value="{{ student['name'] }}"><br><br>

<label>Email</label><br>
<input type="text" name="email" value="{{ student['email'] }}"><br><br>

<label>Course</label><br>
<input type="text" name="course" value="{{ student['course'] }}"><br><br>

<button type="submit">Update Student</button>

</form>

<br>

<a href="/students">Back to Students</a>

</body>
</html>
